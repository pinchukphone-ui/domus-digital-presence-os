name: Preview pilot
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  packages: write
jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/public-web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/public-web:pr-${{ github.event.pull_request.number }}

  preview:
    needs: image
    if: vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ vars.PREVIEW_URL }}
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Deploy shared stable preview
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          WEB_IMAGE: ghcr.io/${{ github.repository }}/public-web@${{ needs.image.outputs.digest }}
        run: ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && WEB_IMAGE='$WEB_IMAGE' docker compose -f infrastructure/deployment/compose.preview.yml pull && WEB_IMAGE='$WEB_IMAGE' docker compose -f infrastructure/deployment/compose.preview.yml up -d"
      - name: Verify preview noindex
        env:
          PREVIEW_URL: ${{ vars.PREVIEW_URL }}
        run: |
          curl --fail --retry 12 --retry-delay 5 "$PREVIEW_URL/healthz"
          curl --fail "$PREVIEW_URL/ru/ipoteka/konsultaciya" | grep -q 'noindex,nofollow,noarchive'
