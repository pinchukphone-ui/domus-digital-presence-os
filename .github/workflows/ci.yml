name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v7
        with: { node-version: 22.23.1, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: docker build -f apps/public-web/Dockerfile .
      - run: docker build -f apps/preview/Dockerfile .
      - run: docker build -t domus-postgres-ci -f infrastructure/docker/postgres/Dockerfile .
      - run: docker run --rm domus-postgres-ci sh -c 'test ! -e /usr/local/bin/gosu && test -x /sbin/su-exec && /sbin/su-exec postgres postgres --version'
