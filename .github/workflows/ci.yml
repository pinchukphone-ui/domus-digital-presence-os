name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.23.1, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: docker build -f apps/public-web/Dockerfile .
